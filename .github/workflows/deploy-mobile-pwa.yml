name: Deploy Mobile PWA and Admin to Render

on:
  push:
    branches: [develop, main]
    paths:
      - 'packages/mobile/**'
      - 'packages/admin/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-mobile-pwa.yml'
  workflow_dispatch:

jobs:
  deploy-mobile:
    name: Deploy Mobile PWA to Render
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy — Mobile PWA
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_MOBILE }}/deploys" \
            -d '{"clearCache":"do_not_clear"}' \
            || (echo "Deploy failed — check RENDER_API_KEY and RENDER_SERVICE_ID_MOBILE secrets" && exit 1)

  deploy-admin:
    name: Deploy Admin Portal to Render
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy — Admin Portal
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_ADMIN }}/deploys" \
            -d '{"clearCache":"do_not_clear"}' \
            || (echo "Deploy failed — check RENDER_API_KEY and RENDER_SERVICE_ID_ADMIN secrets" && exit 1)
