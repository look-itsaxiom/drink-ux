name: Deploy Mobile PWA and Admin to Render

on:
  push:
    branches: [develop, main]
    paths:
      - 'packages/mobile/**'
      - 'packages/admin/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-mobile-pwa.yml'
  workflow_dispatch:

jobs:
  deploy-mobile:
    name: Deploy Mobile PWA to Render
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy — Mobile PWA
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_MOBILE }}" \
            || (echo "Deploy hook failed — check RENDER_DEPLOY_HOOK_MOBILE secret" && exit 1)

  deploy-admin:
    name: Deploy Admin Portal to Render
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy — Admin Portal
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }}" \
            || (echo "Deploy hook failed — check RENDER_DEPLOY_HOOK_ADMIN secret" && exit 1)
