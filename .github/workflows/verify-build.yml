name: Verify Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: drinkux
          POSTGRES_PASSWORD: drinkux_test
          POSTGRES_DB: drinkux_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client for API
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      # ── 0. Build shared (other packages depend on it for type resolution)
      - name: Build shared package
        run: npm run build --workspace=@drink-ux/shared

      # ── 1. Type checking ─────────────────────────────────────────────────────
      - name: Type check — shared
        run: npx tsc --noEmit
        working-directory: packages/shared

      - name: Type check — api
        run: npx tsc --noEmit
        working-directory: packages/api

      - name: Type check — admin
        run: npx tsc --noEmit
        working-directory: packages/admin

      - name: Type check — mobile
        run: npx tsc --noEmit
        working-directory: packages/mobile

      # ── 2. Lint ──────────────────────────────────────────────────────────────
      - name: Lint (0 errors, max 80 warnings)
        run: npx eslint packages/shared/src packages/api/src packages/admin/src packages/mobile/src --max-warnings=80

      # ── 3. Tests ─────────────────────────────────────────────────────────────
      - name: Setup test database for API
        run: npx prisma migrate deploy
        working-directory: packages/api
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Run API tests with coverage
        run: npm run test:ci
        working-directory: packages/api
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Run other package tests
        run: npm run test --workspaces --if-present
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      # ── 4. Build ─────────────────────────────────────────────────────────────
      - name: Build shared package first
        run: npm run build --workspace=@drink-ux/shared

      - name: Build API package
        run: npm run build --workspace=@drink-ux/api
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Build Admin package
        run: npm run build --workspace=@drink-ux/admin

      - name: Build Mobile package
        run: npm run build --workspace=@drink-ux/mobile
