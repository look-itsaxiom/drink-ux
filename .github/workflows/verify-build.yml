name: Verify Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client for API
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      # ── 1. Type checking ─────────────────────────────────────────────────────
      - name: Type check — shared
        run: npx tsc --noEmit
        working-directory: packages/shared

      - name: Type check — api
        run: npx tsc --noEmit
        working-directory: packages/api

      - name: Type check — admin
        run: npx tsc --noEmit
        working-directory: packages/admin

      - name: Type check — mobile
        run: npx tsc --noEmit
        working-directory: packages/mobile

      # ── 2. Lint ──────────────────────────────────────────────────────────────
      - name: Lint (0 errors, max 80 warnings)
        run: npx eslint packages/shared/src packages/api/src packages/admin/src packages/mobile/src --max-warnings=80

      # ── 3. Tests ─────────────────────────────────────────────────────────────
      - name: Setup test database for API
        run: npx prisma migrate deploy
        working-directory: packages/api
        env:
          DATABASE_URL: "file:./prisma/test.db"

      - name: Run API tests with coverage
        run: npm run test:ci
        working-directory: packages/api
        env:
          DATABASE_URL: "file:./prisma/test.db"

      - name: Run other package tests
        run: npm run test --workspaces --if-present
        env:
          DATABASE_URL: "file:./prisma/test.db"

      # ── 4. Build ─────────────────────────────────────────────────────────────
      - name: Build shared package first
        run: npm run build --workspace=@drink-ux/shared

      - name: Verify shared package build output
        run: |
          if [ ! -f "packages/shared/dist/index.js" ]; then
            echo "❌ Shared package build failed - missing dist/index.js"
            exit 1
          fi
          echo "✅ Shared package built successfully"

      - name: Build API package
        run: npm run build --workspace=@drink-ux/api
        env:
          DATABASE_URL: "file:./prisma/test.db"

      - name: Verify API package build
        run: |
          if [ ! -f "packages/api/dist/index.js" ]; then
            echo "❌ API package build failed - missing dist/index.js"
            exit 1
          fi
          echo "✅ API package built successfully"

      - name: Build Admin package
        run: npm run build --workspace=@drink-ux/admin

      - name: Verify Admin package build
        run: |
          if [ ! -d "packages/admin/dist" ]; then
            echo "❌ Admin package build failed - missing dist directory"
            exit 1
          fi
          echo "✅ Admin package built successfully"

      - name: Build Mobile package
        run: npm run build --workspace=@drink-ux/mobile

      - name: Verify Mobile package build
        run: |
          if [ ! -d "packages/mobile/dist" ]; then
            echo "❌ Mobile package build failed - missing dist directory"
            exit 1
          fi
          echo "✅ Mobile package built successfully"

      - name: Build summary
        run: |
          echo "🎉 All checks passed!"
          echo "  ✅ Type checking — all packages"
          echo "  ✅ Lint — 0 errors"
          echo "  ✅ Tests — api + all packages"
          echo "  ✅ Build — all packages"
