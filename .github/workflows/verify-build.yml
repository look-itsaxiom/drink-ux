name: Verify Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  # Also run on pushes to any branch that has an open PR
  pull_request_target:
    branches: [main, develop]

jobs:
  verify-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: drinkux
          POSTGRES_PASSWORD: drinkux_test
          POSTGRES_DB: drinkux_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client for API
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      - name: Setup test database for API
        run: |
          cd packages/api
          npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Build shared package first
        run: npm run build --workspace=@drink-ux/shared

      - name: Verify shared package build output
        run: |
          if [ ! -f "packages/shared/dist/index.js" ]; then
            echo "❌ Shared package build failed - missing dist/index.js"
            exit 1
          fi
          if [ ! -f "packages/shared/dist/index.d.ts" ]; then
            echo "❌ Shared package build failed - missing dist/index.d.ts"
            exit 1
          fi
          echo "✅ Shared package built successfully"

      - name: Build API package
        run: npm run build --workspace=@drink-ux/api
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Verify API package build
        run: |
          if [ ! -f "packages/api/dist/index.js" ]; then
            echo "❌ API package build failed - missing dist/index.js"
            exit 1
          fi
          echo "✅ API package built successfully"

      - name: Build Admin package
        run: npm run build --workspace=@drink-ux/admin

      - name: Verify Admin package build
        run: |
          if [ ! -d "packages/admin/dist" ]; then
            echo "❌ Admin package build failed - missing dist directory"
            exit 1
          fi
          echo "✅ Admin package built successfully"

      - name: Build Mobile package
        run: npm run build --workspace=@drink-ux/mobile

      - name: Verify Mobile package build
        run: |
          if [ ! -d "packages/mobile/dist" ]; then
            echo "❌ Mobile package build failed - missing dist directory"
            exit 1
          fi
          echo "✅ Mobile package built successfully"

      - name: Run API tests
        run: npm run test --workspace=@drink-ux/api
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Verify API tests passed
        run: |
          echo "✅ API tests completed successfully"

      - name: Run tests (if any)
        run: npm run test --workspaces --if-present
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Build summary
        run: |
          echo "🎉 All packages built and tested successfully!"
          echo "📦 Packages verified:"
          echo "  - @drink-ux/shared ✅"
          echo "  - @drink-ux/api ✅ (with tests)"
          echo "  - @drink-ux/admin ✅"
          echo "  - @drink-ux/mobile ✅"
