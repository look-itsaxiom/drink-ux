name: Verify Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  verify-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: drinkux
          POSTGRES_PASSWORD: drinkux_test
          POSTGRES_DB: drinkux_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client for API
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      - name: Setup test database for API
        run: |
          cd packages/api
          npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Type check all packages
        run: npm run typecheck
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Lint all packages
        run: npm run lint

      - name: Build shared package first
        run: npm run build --workspace=@drink-ux/shared

      - name: Build API package
        run: npm run build --workspace=@drink-ux/api
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Build Admin package
        run: npm run build --workspace=@drink-ux/admin

      - name: Build Mobile package
        run: npm run build --workspace=@drink-ux/mobile

      - name: Run all tests
        run: npm run test --workspaces --if-present
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"
