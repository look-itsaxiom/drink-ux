name: Deploy API to Render

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/api/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: drinkux
          POSTGRES_PASSWORD: drinkux_test
          POSTGRES_DB: drinkux_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@drink-ux/shared

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/api

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: packages/api
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Run API tests
        run: npm test
        working-directory: packages/api
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}" \
            || (echo "Deploy hook failed — check RENDER_DEPLOY_HOOK_API secret" && exit 1)
