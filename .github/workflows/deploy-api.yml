name: Deploy API to Railway

on:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: drinkux
          POSTGRES_PASSWORD: drinkux_test
          POSTGRES_DB: drinkux_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@drink-ux/shared

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/api

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: packages/api
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

      - name: Run API tests
        run: npm test
        working-directory: packages/api
        env:
          DATABASE_URL: "postgresql://drinkux:drinkux_test@localhost:5432/drinkux_test"

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Run database migrations
        run: railway run --service api npx prisma migrate deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
