# Drink-UX Full Stack Docker Compose
# Run: docker-compose up --build
# Access:
#   - Mobile:  http://localhost:3000
#   - API:     http://localhost:3001
#   - Admin:   http://localhost:3002
#   - DB:      localhost:5432

name: drink-ux

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: drink-ux-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: drinkux
      POSTGRES_PASSWORD: drinkux_password
      POSTGRES_DB: drinkux
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drinkux"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drink-ux-network

  # API Server
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: drink-ux-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://drinkux:drinkux_password@db:5432/drinkux
      SESSION_SECRET: ${SESSION_SECRET:-docker-dev-session-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-docker-dev-encryption-key-32ch}
      SQUARE_ENVIRONMENT: ${SQUARE_ENVIRONMENT:-sandbox}
      SQUARE_APPLICATION_ID: ${SQUARE_APPLICATION_ID:-}
      SQUARE_ACCESS_TOKEN: ${SQUARE_ACCESS_TOKEN:-}
      SQUARE_WEBHOOK_SIGNATURE_KEY: ${SQUARE_WEBHOOK_SIGNATURE_KEY:-}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3002
    ports:
      - "3001:3001"
    networks:
      - drink-ux-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mobile PWA
  mobile:
    build:
      context: .
      dockerfile: packages/mobile/Dockerfile
    container_name: drink-ux-mobile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - drink-ux-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin Portal
  admin:
    build:
      context: .
      dockerfile: packages/admin/Dockerfile
    container_name: drink-ux-admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3002:3002"
    networks:
      - drink-ux-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  drink-ux-network:
    driver: bridge

volumes:
  postgres_data:
