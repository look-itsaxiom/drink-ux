<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drink-UX | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Mocking the theme variables from THEMING.md */
            --theme-primary: #6B4226;
            --theme-primary-dark: #4A2C1A;
            --theme-gradient-primary: linear-gradient(135deg, #6B4226 0%, #4A2C1A 100%);
            --theme-surface: rgba(255, 255, 255, 0.95);
            --theme-text: #2c3e50;
            --theme-text-secondary: #7f8c8d;
            --theme-border: #e0e0e0;
            --theme-shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: #f8f9fa;
            color: var(--theme-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .bg-theme-gradient {
            background: var(--theme-gradient-primary);
        }

        .text-theme-primary {
            color: var(--theme-primary);
        }

        .btn-primary {
            background: var(--theme-gradient-primary);
            color: white;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .card {
            background: var(--theme-surface);
            border: 1px solid var(--theme-border);
            box-shadow: 0 4px 16px var(--theme-shadow);
            border-radius: 24px;
        }

        .input-field {
            border: 1px solid var(--theme-border);
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--theme-primary);
        }

        /* Entrance Animation */
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-slide-up {
            animation: slideUp 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full animate-slide-up">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-theme-primary mb-2">Drink-UX</h1>
            <p class="text-theme-text-secondary">Premium ordering for your coffee shop</p>
        </div>

        <div class="card p-8">
            <h2 class="text-2xl font-semibold mb-6">Create your account</h2>
            
            <form class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Shop Name</label>
                    <input type="text" class="input-field" placeholder="The Daily Grind">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Email Address</label>
                    <input type="email" class="input-field" placeholder="owner@shop.com">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" class="input-field" placeholder="••••••••">
                </div>

                <div class="pt-4">
                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-bold shadow-lg">
                        Start 14-Day Free Trial
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-sm text-theme-text-secondary">
                    Already have an account? 
                    <a href="#" class="text-theme-primary font-semibold hover:underline">Log in</a>
                </p>
            </div>
        </div>

        <div class="mt-8 text-center text-xs text-theme-text-secondary">
            <p>By signing up, you agree to our <a href="#" class="underline">Terms of Service</a> and <a href="#" class="underline">Privacy Policy</a>.</p>
        </div>
    </div>

</body>
</html>
