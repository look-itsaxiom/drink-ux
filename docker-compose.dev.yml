# Drink-UX Development Docker Compose
# Run: docker-compose -f docker-compose.dev.yml up
# Uses volume mounts for hot reloading during development

name: drink-ux-dev

services:
  # PostgreSQL Database for development
  db:
    image: postgres:15-alpine
    container_name: drink-ux-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: drinkux
      POSTGRES_PASSWORD: drinkux_password
      POSTGRES_DB: drinkux_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drinkux"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drink-ux-dev-network

  # API Server with hot reload
  api:
    image: node:20-alpine
    container_name: drink-ux-api-dev
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://drinkux:drinkux_password@db:5432/drinkux_dev
      SESSION_SECRET: dev-session-secret
      ENCRYPTION_KEY: dev-encryption-key-32-characters
      SQUARE_ENVIRONMENT: sandbox
      SQUARE_APPLICATION_ID: ${SQUARE_APPLICATION_ID:-}
      SQUARE_ACCESS_TOKEN: ${SQUARE_ACCESS_TOKEN:-}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/api/node_modules
      - /app/packages/shared/node_modules
    ports:
      - "3001:3001"
    networks:
      - drink-ux-dev-network
    command: >
      sh -c "npm install &&
             cd packages/shared && npm run build && cd ../.. &&
             cd packages/api && npx prisma generate && npx prisma migrate dev && npm run dev"

  # Mobile with hot reload
  mobile:
    image: node:20-alpine
    container_name: drink-ux-mobile-dev
    working_dir: /app
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/mobile/node_modules
      - /app/packages/shared/node_modules
    ports:
      - "3000:3000"
    networks:
      - drink-ux-dev-network
    command: >
      sh -c "npm install &&
             cd packages/shared && npm run build && cd ../.. &&
             cd packages/mobile && npm run dev -- --host 0.0.0.0"

  # Admin with hot reload
  admin:
    image: node:20-alpine
    container_name: drink-ux-admin-dev
    working_dir: /app
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/admin/node_modules
      - /app/packages/shared/node_modules
    ports:
      - "3002:3002"
    networks:
      - drink-ux-dev-network
    command: >
      sh -c "npm install &&
             cd packages/shared && npm run build && cd ../.. &&
             cd packages/admin && npm run dev -- --host 0.0.0.0"

networks:
  drink-ux-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
