# Drink-UX Test Environment Docker Compose
# Run: docker-compose -f docker-compose.test.yml up --build
# Includes test database with migrations and seed data

name: drink-ux-test

services:
  # Test Database
  db-test:
    image: postgres:15-alpine
    container_name: drink-ux-db-test
    environment:
      POSTGRES_USER: drinkux_test
      POSTGRES_PASSWORD: drinkux_test_password
      POSTGRES_DB: drinkux_test
    tmpfs:
      - /var/lib/postgresql/data  # In-memory for faster tests
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drinkux_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - drink-ux-test-network

  # API for testing (with test database)
  api-test:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: drink-ux-api-test
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://drinkux_test:drinkux_test_password@db-test:5432/drinkux_test
      SESSION_SECRET: test-session-secret
      ENCRYPTION_KEY: test-encryption-key-32-chars!!
      SQUARE_ENVIRONMENT: sandbox
      SQUARE_APPLICATION_ID: test-app-id
      SQUARE_ACCESS_TOKEN: test-access-token
      CORS_ORIGIN: "*"
    ports:
      - "3001:3001"
    networks:
      - drink-ux-test-network
    # Run migrations on startup
    command: >
      sh -c "npx prisma migrate deploy && node dist/index.js"

  # Test runner container
  test-runner:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: builder  # Use builder stage with devDependencies
    container_name: drink-ux-test-runner
    depends_on:
      api-test:
        condition: service_healthy
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://drinkux_test:drinkux_test_password@db-test:5432/drinkux_test
      API_URL: http://api-test:3001
    working_dir: /app/packages/api
    command: npm test
    networks:
      - drink-ux-test-network

networks:
  drink-ux-test-network:
    driver: bridge
